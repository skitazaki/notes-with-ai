name: Oxfmt

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  oxfmt:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".node-version"
      - name: Setup pnpm
        uses: pnpm/action-setup@v5
      - name: Install dependencies
        run: pnpm install
      - name: Run oxfmt check
        run: pnpm exec oxfmt --check .
